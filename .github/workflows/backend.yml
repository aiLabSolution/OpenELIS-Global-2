name: 01 - Backend

# Touched to register this workflow with GitHub Actions on the aiLabSolution
# fork. It was present in the imported tree but never indexed, so pull requests
# to `main` ran no backend checks (only publish-images.yml + Dependency Graph
# were registered). This comment is behavior-neutral: triggers and jobs are
# unchanged; the `pull_request` event below already covers PRs to `main`.
on:
  push:
    branches: [develop]
  pull_request:
  workflow_dispatch:

jobs:
  # Gate the expensive Maven build behind a path filter. On pull_request,
  # skip backend-verify entirely when no backend-relevant files changed.
  # On push to develop and workflow_dispatch the filter step is skipped
  # and the `|| 'true'` fallback forces a full build so the JaCoCo badge
  # and Pages publish steps always run on merge.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend || 'true' }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
      - name: Detect backend paths
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'src/**'
              - 'pom.xml'
              - 'dataexport/**'
              - 'plugins/**'
              - 'fhir/**'
              - 'Dockerfile'
              - 'build.docker-compose.yml'
              - 'docker-compose.yml'
              - 'dev.docker-compose.yml'
              - 'docker-compose.letsencrypt.yml'
              - '.github/ci/ci.analyzer-harness.yml'
              - '.github/workflows/backend.yml'

  backend-verify:
    name: Build + Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache local Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Checkout OpenELIS-Global2
        uses: actions/checkout@v6
        with:
          repository: ${{github.repository}}
          # LIS-210: do NOT clone submodules recursively. The `plugins` submodule
          # points at the private aiLabSolution/openelisglobal-plugins fork, which
          # the default GITHUB_TOKEN cannot read, so a recursive clone dies with
          # "repository not found" before anything compiles. The backend Build+Test
          # never builds plugins (the plugin deps live in the un-activated
          # `with-plugins` profile and spotless excludes plugins/**); the only
          # submodule this job actually builds is `dataexport`, initialized below.
          submodules: false

      # LIS-210: init only the build-required public submodule (dataexport),
      # explicitly avoiding the private plugins fork. Add other submodules here
      # if a future build step needs their sources.
      - name: Initialize build-required submodules
        run: git submodule update --init dataexport

      - name: check formatting
        run: mvn spotless:check

      - name: Initialize and build submodules
        run: |
          cd dataexport
          mvn clean install
          cd ..

      - name: Build main project (produces classes JAR and test-jar for plugins)
        run: mvn clean install -Dspotless.check.skip=true

      # - name: Build plugins (compile-only until analyzer stubs are replaced)
      #   run: cd plugins && mvn clean verify -DskipTests -Dmaven.test.skip=true

      - name: Generate JaCoCo Badge
        if: github.event_name == 'push'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: target/html/badges

      - name: Fix permissions
        if: github.event_name == 'push'
        run: |
              sudo chown -R "$(whoami)":"$(whoami)" target/html
              sudo chmod -R 755 target/html  # Read-write for owner, read for others

      - name: Check coverage report exists
        if: github.event_name == 'push'
        run: ls -lah target/html || echo "Coverage report not found!"     

      - name: Publish coverage report to GitHub Pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: target/html/

  backend-checkpoint:
    name: 01 Checkpoint - Backend
    if: always()
    needs: [changes, backend-verify]
    runs-on: ubuntu-latest
    steps:
      - name: Check backend result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          BACKEND_RESULT: ${{ needs.backend-verify.result }}
        run: |
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Change detection failed: $CHANGES_RESULT"
            exit 1
          fi
          if [[ "$BACKEND_RESULT" != "success" && "$BACKEND_RESULT" != "skipped" ]]; then
            echo "Backend verification failed: $BACKEND_RESULT"
            exit 1
          fi
          echo "Backend checkpoint passed (changes=$CHANGES_RESULT, verify=$BACKEND_RESULT)."
