# Native fork E2E executor. This workflow is the privileged fork path under
# pull_request_target; repository approval settings remain the trust boundary.
name: 03 - E2E - Fork PR

on:
  pull_request_target:
    branches: [develop]

concurrency:
  group: e2e-fork-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      is_fork: ${{ steps.context.outputs.is_fork }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      head_sha: ${{ steps.context.outputs.head_sha }}
      status_sha: ${{ steps.context.outputs.status_sha }}
      core_demo_changed: ${{ steps.demo-diff.outputs.core_demo_changed }}
      harness_demo_changed: ${{ steps.demo-diff.outputs.harness_demo_changed }}
    steps:
      - name: Capture pull request context
        id: context
        run: |
          IS_FORK="${{ github.event.pull_request.head.repo.fork && 'true' || 'false' }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          HEAD_SHA="refs/pull/${PR_NUMBER}/merge"
          STATUS_SHA="${{ github.event.pull_request.head.sha }}"

          echo "is_fork=$IS_FORK" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "status_sha=$STATUS_SHA" >> "$GITHUB_OUTPUT"

          echo "Context: fork=$IS_FORK pr=#$PR_NUMBER checkout_ref=$HEAD_SHA status_sha=$STATUS_SHA"

      - name: Detect demo-spec diff buckets for PR
        id: demo-diff
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "core_demo_changed=false" >> "$GITHUB_OUTPUT"
          echo "harness_demo_changed=false" >> "$GITHUB_OUTPUT"

          gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename' > /tmp/pr-files.txt
          echo "Changed files from PR #$PR_NUMBER:"
          sed 's/^/  - /' /tmp/pr-files.txt || true

          if grep -qE '^frontend/playwright/tests/demo/core/.*\.spec\.ts$' /tmp/pr-files.txt; then
            echo "core_demo_changed=true" >> "$GITHUB_OUTPUT"
          fi

          if grep -qE '^frontend/playwright/tests/demo/harness/.*\.spec\.ts$' /tmp/pr-files.txt; then
            echo "harness_demo_changed=true" >> "$GITHUB_OUTPUT"
          fi

  fork-rebuild:
    name: Shared Build (Fork Rebuild)
    needs: setup
    if: needs.setup.outputs.is_fork == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ needs.setup.outputs.pr_number }}/merge
          submodules: recursive
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare .env
        run: cp .env.example .env

      - name: Build OpenELIS artifacts for plugin compilation
        run: |
          cd dataexport/dataexport-core
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          # NOTE: Do NOT add -Dmaven.test.skip=true here — the root build must
          # compile test classes so maven-jar-plugin produces the test-jar
          # (openelisglobal:jar:tests) required by GenericASTM/File/HL7 plugins.
          mvn clean install -DskipTests -Dspotless.check.skip=true -Dfix.version=3

      - name: Build plugins
        run: mvn clean install -DskipTests -Dmaven.test.skip=true
        working-directory: plugins

      - name: Stage plugin jars for runtime loading
        run: |
          rm -rf volume/plugins/*
          find plugins/analyzers -type f -path "*/target/*.jar" \
            ! -name "*sources.jar" ! -name "*javadoc.jar" \
            -exec cp {} volume/plugins/ \;
          ls -lah volume/plugins

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all compose images (cached, read-only)
        uses: docker/bake-action@v5
        with:
          files: |
            build.docker-compose.yml
            .github/ci/ci.analyzer-harness.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e-shared

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push compose images to GHCR
        run: |
          TAG="sha-${{ github.event.pull_request.head.sha }}"
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          export TAG OWNER_LOWER
          docker compose -f build.docker-compose.yml config --images | sort -u > /tmp/e2e-images-base.txt
          docker compose -f build.docker-compose.yml -f .github/ci/ci.analyzer-harness.yml config --images | sort -u > /tmp/e2e-images-full.txt
          xargs -r -I{} -P4 bash -lc '
            image="$1"
            [ -z "$image" ] && exit 0
            if docker image inspect "$image" >/dev/null 2>&1; then
              image_repo="$(echo "$image" | tr "[:upper:]" "[:lower:]" | sed "s|[^a-z0-9._/-]|-|g")"
              ghcr_image="ghcr.io/${OWNER_LOWER}/openelis-global-2/e2e-cache/${image_repo}:${TAG}"
              docker tag "$image" "$ghcr_image"
              push_err=$(docker push "$ghcr_image" 2>&1) && {
                printf "%s|%s\n" "$image" "$ghcr_image"
              } || {
                echo "PUSH FAILED ($image): $push_err" >&2
                exit 1
              }
            else
              echo "WARN: skipping $image (not built locally)" >&2
            fi
          ' _ {} < /tmp/e2e-images-full.txt | sort -u > /tmp/e2e-image-map.txt

          awk -F'|' 'NR==FNR {base[$1]=1; next} ($1 in base) {print}' \
            /tmp/e2e-images-base.txt /tmp/e2e-image-map.txt > /tmp/e2e-image-map-base.txt

          if [ ! -s /tmp/e2e-image-map.txt ]; then
            echo "::error::No images were pushed to GHCR"
            exit 1
          fi
          if [ ! -s /tmp/e2e-image-map-base.txt ]; then
            echo "WARN: no base compose image mappings found; falling back to full image map."
            cp /tmp/e2e-image-map.txt /tmp/e2e-image-map-base.txt
          fi
          echo "Pushed image mappings:"
          cat /tmp/e2e-image-map.txt

      - name: Upload plugin jars artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-plugin-jars
          path: volume/plugins/*.jar
          if-no-files-found: error
          retention-days: 1

      - name: Upload Docker image map artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image-map
          path: /tmp/e2e-image-map.txt
          if-no-files-found: error
          retention-days: 1

      - name: Upload base Docker image map artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map-base.txt
          if-no-files-found: error
          retention-days: 1

  set-pending-status:
    name: Set Fork Pending Status
    needs: setup
    if: needs.setup.outputs.status_sha != ''
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post fork checkpoint status
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.setup.outputs.status_sha }}';
            const contextName = '03 Checkpoint - E2E - Fork PR';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const isFork = '${{ needs.setup.outputs.is_fork }}' === 'true';
            const state = isFork ? 'pending' : 'success';
            const description = isFork
              ? 'Fork Playwright, Cypress, and analyzer-harness suites are running...'
              : 'Not applicable - non-fork PRs use 03 Checkpoint - E2E';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: contextName,
              description,
              target_url: runUrl
            });

  playwright-core:
    name: Playwright Core ${{ matrix.shard_index }}/${{ matrix.shard_total }}
    needs: [setup, fork-rebuild]
    if: needs.setup.outputs.is_fork == 'true' && needs.fork-rebuild.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 1
            shard_total: 2
          - shard_index: 2
            shard_total: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.head_sha }}
          submodules: recursive
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Enforce Playwright guards
        run: npm run pw:guard
        working-directory: frontend

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Download image map from fork rebuild
        uses: actions/download-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag prebuilt compose images
        run: |
          xargs -r -I{} -P4 bash -lc '
            IFS="|" read -r source_image ghcr_image <<< "$1"
            [ -z "$source_image" ] && exit 0
            docker pull "$ghcr_image" >/dev/null
            docker tag "$ghcr_image" "$source_image"
          ' _ {} < /tmp/e2e-image-map/e2e-image-map-base.txt

      - name: Start OpenELIS containers (no rebuild)
        run: docker compose -f build.docker-compose.yml up -d --no-build --wait --wait-timeout 600

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to respond..."
          timeout 60 bash -c 'until curl -k -s -f https://localhost/ > /dev/null; do sleep 2; done' || exit 1
          echo "Application is ready"

      - name: Load E2E foundational + demo patient data (order entry / OGC-284)
        run: |
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims -v ON_ERROR_STOP=1 \
            < src/test/resources/e2e-foundational-data.sql
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims -v ON_ERROR_STOP=1 \
            < src/test/resources/analyzer-harness-e2e.sql

      - name: Load FILE analyzer E2E fixtures (deactivate legacy types)
        run: |
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims -v ON_ERROR_STOP=1 \
            < src/test/resources/fixtures/file-import-e2e.sql

      - name: Create analyzer import directories in container
        run: |
          docker exec openelisglobal-webapp mkdir -p \
            /data/analyzer-imports/e2e-qs5/incoming \
            /data/analyzer-imports/e2e-qs7/incoming \
            /data/analyzer-imports/e2e-fluorocycler/incoming

      - name: Run Playwright tests
        run: npm run pw:test -- --project=core-app --project=core-demo --shard=${{ matrix.shard_index }}/${{ matrix.shard_total }}
        working-directory: frontend
        env:
          CI: true
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ vars.TEST_PASS || 'adminADMIN!' }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-blob-report-${{ matrix.shard_index }}
          path: frontend/blob-report
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-screenshots-${{ matrix.shard_index }}
          path: frontend/test-results/**/test-failed-*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-traces-${{ matrix.shard_index }}
          path: frontend/test-results/**/trace.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: "100"

  analyzer-harness:
    name: Analyzer Harness
    needs: [setup, fork-rebuild]
    if: needs.setup.outputs.is_fork == 'true' && needs.fork-rebuild.result == 'success'
    uses: ./.github/workflows/e2e-playwright-analyzer-harness-reusable.yml
    permissions:
      contents: read
      packages: read
      actions: read
      issues: write
      pull-requests: write
    with:
      build_run_id: ""
      is_fork: ${{ 'true' }}
      head_sha: ${{ needs.setup.outputs.head_sha }}
      test_user: ${{ vars.TEST_USER || 'admin' }}
      test_pass: ${{ vars.TEST_PASS || 'adminADMIN!' }}
      pr_number: ${{ needs.setup.outputs.pr_number }}

  core-demo-video-evidence:
    name: Core Demo Video Evidence
    needs: [setup, fork-rebuild]
    if: needs.setup.outputs.is_fork == 'true' && needs.setup.outputs.core_demo_changed == 'true' && needs.fork-rebuild.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.head_sha }}
          submodules: recursive
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Enforce Playwright guards
        run: npm run pw:guard
        working-directory: frontend

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Download image map from fork rebuild
        uses: actions/download-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag prebuilt compose images
        run: |
          xargs -r -I{} -P4 bash -lc '
            IFS="|" read -r source_image ghcr_image <<< "$1"
            [ -z "$source_image" ] && exit 0
            docker pull "$ghcr_image" >/dev/null
            docker tag "$ghcr_image" "$source_image"
          ' _ {} < /tmp/e2e-image-map/e2e-image-map-base.txt

      - name: Start OpenELIS containers (no rebuild)
        run: docker compose -f build.docker-compose.yml up -d --no-build --wait --wait-timeout 600

      - name: Wait for application to be ready
        run: |
          timeout 60 bash -c 'until curl -k -s -f https://localhost/ > /dev/null; do sleep 2; done'

      - name: Load E2E foundational + demo patient data
        run: |
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims -v ON_ERROR_STOP=1 \
            < src/test/resources/e2e-foundational-data.sql
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims -v ON_ERROR_STOP=1 \
            < src/test/resources/analyzer-harness-e2e.sql

      - name: Run Playwright core demo video tests
        run: npm run pw:test -- --project=core-demo-video --workers=1
        working-directory: frontend
        env:
          CI: true
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ vars.TEST_PASS || 'adminADMIN!' }}
          PLAYWRIGHT_SLOWMO: "500"

      - name: Resolve Playwright version for report merge
        id: core-video-playwright-version
        working-directory: frontend
        run: |
          VERSION=$(node -e "const lock=require('./package-lock.json'); const pkg=require('./package.json'); const clean=(s)=>s?String(s).replace(/^[~^]/,''):''; const v=(lock.packages?.['node_modules/playwright']?.version)||(lock.packages?.['node_modules/@playwright/test']?.version)||clean(pkg.devDependencies?.['@playwright/test'])||clean(pkg.dependencies?.playwright); if(!v){console.error('Unable to resolve Playwright version for report merge'); process.exit(1);} process.stdout.write(v);")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build core demo video HTML report
        if: ${{ always() }}
        run: |
          if [ -d ./blob-report ] && [ -n "$(ls -A ./blob-report 2>/dev/null)" ]; then
            npx --yes playwright@${{ steps.core-video-playwright-version.outputs.version }} merge-reports --reporter html ./blob-report
          else
            echo "No blob report found; skipping HTML report merge."
          fi
        working-directory: frontend

      - name: Create core demo video evidence bundle
        if: ${{ always() }}
        working-directory: frontend
        run: |
          BUNDLE="playwright-core-demo-video-evidence-attempt-${{ github.run_attempt }}.zip"
          INPUTS=()
          if [ -d "playwright-report" ]; then
            INPUTS+=("playwright-report")
          fi
          if [ -d "test-results" ]; then
            INPUTS+=("test-results")
          fi
          if [ "${#INPUTS[@]}" -eq 0 ]; then
            echo "No report/test-results directories found; skipping bundle."
            exit 0
          fi
          zip -r "$BUNDLE" "${INPUTS[@]}"

      - name: Upload core demo video blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-demo-video-blob-report
          path: frontend/blob-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload core demo video test-results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-demo-video-test-results
          path: frontend/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload core demo video HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-demo-video-report-html-attempt-${{ github.run_attempt }}
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload core demo video evidence bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-demo-video-evidence-attempt-${{ github.run_attempt }}
          path: frontend/playwright-core-demo-video-evidence-attempt-${{ github.run_attempt }}.zip
          if-no-files-found: ignore
          retention-days: 14

  analyzer-harness-video-evidence:
    name: Analyzer Harness Demo Video Evidence
    needs: [setup, fork-rebuild]
    if: needs.setup.outputs.is_fork == 'true' && needs.setup.outputs.harness_demo_changed == 'true' && needs.fork-rebuild.result == 'success'
    uses: ./.github/workflows/e2e-playwright-analyzer-harness-reusable.yml
    permissions:
      contents: read
      packages: read
      actions: read
      issues: write
      pull-requests: write
    with:
      build_run_id: ""
      is_fork: ${{ 'true' }}
      head_sha: ${{ needs.setup.outputs.head_sha }}
      test_user: ${{ vars.TEST_USER || 'admin' }}
      test_pass: ${{ vars.TEST_PASS || 'adminADMIN!' }}
      pr_number: ${{ needs.setup.outputs.pr_number }}
      playwright_project: harness-demo-video

  cypress:
    name: Cypress
    needs: [setup, fork-rebuild]
    if: needs.setup.outputs.is_fork == 'true' && needs.fork-rebuild.result == 'success'
    uses: ./.github/workflows/e2e-cypress-deprecated.yml
    permissions:
      contents: read
      packages: read
      actions: read
    with:
      build_run_id: ""
      is_fork: ${{ 'true' }}
      head_sha: ${{ needs.setup.outputs.head_sha }}
      test_user: ${{ vars.TEST_USER || 'admin' }}
      test_pass: ${{ vars.TEST_PASS || 'adminADMIN!' }}

  e2e-gate:
    name: Fork E2E Gate
    if: always()
    needs:
      [
        setup,
        fork-rebuild,
        playwright-core,
        analyzer-harness,
        core-demo-video-evidence,
        analyzer-harness-video-evidence,
        cypress,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce fork E2E results or report non-fork no-op
        run: |
          if [[ "${{ needs.setup.outputs.is_fork }}" != "true" ]]; then
            echo "Non-fork PR detected; fork-native workflow is not authoritative for this run."
            echo "Not applicable."
            {
              echo "## 03 Checkpoint - E2E - Fork PR"
              echo ""
              echo "Status: \`not_applicable\`"
              echo "Reason: non-fork PRs are handled by \`03 Checkpoint - E2E\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [[ "${{ needs.fork-rebuild.result }}" != "success" ]]; then
            echo "Fork rebuild failed: ${{ needs.fork-rebuild.result }}"
            exit 1
          fi
          if [[ "${{ needs.playwright-core.result }}" != "success" ]]; then
            echo "Playwright Core failed: ${{ needs.playwright-core.result }}"
            exit 1
          fi
          if [[ "${{ needs.analyzer-harness.result }}" != "success" && "${{ needs.analyzer-harness.result }}" != "skipped" ]]; then
            echo "Analyzer Harness failed: ${{ needs.analyzer-harness.result }}"
            exit 1
          fi
          if [[ "${{ needs.core-demo-video-evidence.result }}" != "success" && "${{ needs.core-demo-video-evidence.result }}" != "skipped" ]]; then
            echo "Core Demo Video Evidence failed: ${{ needs.core-demo-video-evidence.result }}"
            exit 1
          fi
          if [[ "${{ needs.analyzer-harness-video-evidence.result }}" != "success" && "${{ needs.analyzer-harness-video-evidence.result }}" != "skipped" ]]; then
            echo "Analyzer Harness Demo Video Evidence failed: ${{ needs.analyzer-harness-video-evidence.result }}"
            exit 1
          fi
          if [[ "${{ needs.cypress.result }}" != "success" ]]; then
            echo "Cypress failed: ${{ needs.cypress.result }}"
            exit 1
          fi
          echo "03 Checkpoint - E2E - Fork PR passed."

  report-status:
    name: Report Fork Status
    if: always() && needs.setup.outputs.status_sha != ''
    needs: [setup, set-pending-status, e2e-gate]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Update fork checkpoint status
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.setup.outputs.status_sha }}';
            const contextName = '03 Checkpoint - E2E - Fork PR';
            const gateResult = '${{ needs.e2e-gate.result }}';
            const isFork = '${{ needs.setup.outputs.is_fork }}' === 'true';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let state, description;
            if (!isFork) {
              state = 'success';
              description = 'Not applicable - non-fork PRs use 03 Checkpoint - E2E';
            } else if (gateResult === 'success') {
              state = 'success';
              description = 'All fork Playwright, Cypress, and analyzer-harness suites passed';
            } else {
              state = 'failure';
              description = 'One or more fork E2E suites failed';
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: contextName,
              description,
              target_url: runUrl
            });
