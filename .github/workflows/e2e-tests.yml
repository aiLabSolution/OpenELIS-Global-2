# Runs ALL E2E tests after the build workflow completes.
# Handles both fork and non-fork PRs identically:
# - Non-fork: images already on GHCR from build workflow, pull and test
# - Fork: rebuild from GHA cache (fast), push to GHCR, then pull and test
# Result: identical CI checks for all PR types.
name: E2E / Tests

on:
  workflow_run:
    workflows: ["03 - E2E"]
    types: [completed]

concurrency:
  group: e2e-tests-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  # ─── Setup ──────────────────────────────────────────────────────────────────
  # Download build context from the triggering workflow run.
  # Determines: is this a fork PR? What SHA/PR# are we working with?
  setup:
    name: Setup
    if: github.repository == 'DIGI-UW/OpenELIS-Global-2' && (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      is_fork: ${{ steps.context.outputs.is_fork }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      pr_sha: ${{ steps.context.outputs.pr_sha }}
      head_sha: ${{ steps.context.outputs.head_sha }}
      event_name: ${{ steps.context.outputs.event_name }}
      image_transfer: ${{ steps.context.outputs.image_transfer }}
      build_run_id: ${{ github.event.workflow_run.id }}
    steps:
      - name: Download build context artifact
        id: download
        uses: actions/download-artifact@v4
        with:
          name: e2e-build-context
          path: /tmp/e2e-build-context
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Parse build context
        id: context
        run: |
          if [ "${{ steps.download.outcome }}" != "success" ] || [ ! -d /tmp/e2e-build-context ]; then
            echo "No build context artifact — build likely failed."
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
            echo "image_transfer=none" >> "$GITHUB_OUTPUT"
            echo "event_name=unknown" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "pr_sha=" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Read build context files
          IS_FORK="$(cat /tmp/e2e-build-context/is_fork 2>/dev/null || echo 'false')"
          IMAGE_TRANSFER="$(cat /tmp/e2e-build-context/image_transfer 2>/dev/null || echo 'none')"
          EVENT_NAME="$(cat /tmp/e2e-build-context/event_name 2>/dev/null || echo 'unknown')"
          PR_NUMBER="$(cat /tmp/e2e-build-context/pr_number 2>/dev/null || echo '')"
          PR_SHA="$(cat /tmp/e2e-build-context/pr_sha 2>/dev/null || echo '')"
          HEAD_SHA="$(cat /tmp/e2e-build-context/head_sha 2>/dev/null || echo '')"

          # For push/release events, head_sha is empty — fall back to the workflow_run SHA
          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          fi

          echo "is_fork=$IS_FORK" >> "$GITHUB_OUTPUT"
          echo "image_transfer=$IMAGE_TRANSFER" >> "$GITHUB_OUTPUT"
          echo "event_name=$EVENT_NAME" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_sha=$PR_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

          echo "Build context: is_fork=$IS_FORK image_transfer=$IMAGE_TRANSFER event=$EVENT_NAME pr=#$PR_NUMBER head_sha=$HEAD_SHA"

  # ─── Set pending check run on PR ────────────────────────────────────────────
  set-pending-status:
    name: Set Pending Status
    needs: setup
    if: needs.setup.outputs.image_transfer != 'none' && needs.setup.outputs.head_sha != ''
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - name: Create or update check run to in_progress
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.setup.outputs.head_sha }}';
            const name = '03 Checkpoint - E2E';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Find existing check run (created by e2e-pending-status.yml)
            const { data: { check_runs } } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              check_name: name,
              filter: 'latest'
            });

            if (check_runs.length > 0) {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: check_runs[0].id,
                status: 'in_progress',
                details_url: runUrl,
                output: {
                  title: 'E2E tests running',
                  summary: 'Playwright, Cypress, and Analyzer Harness tests are in progress...'
                }
              });
            } else {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                name,
                status: 'in_progress',
                details_url: runUrl,
                output: {
                  title: 'E2E tests running',
                  summary: 'Playwright, Cypress, and Analyzer Harness tests are in progress...'
                }
              });
            }

  # ─── Fork Rebuild ───────────────────────────────────────────────────────────
  # Only runs for fork PRs. Rebuilds from GHA cache (fast) and pushes to GHCR
  # using the elevated workflow_run permissions.
  fork-rebuild:
    name: Shared Build (Fork Rebuild)
    needs: setup
    if: needs.setup.outputs.is_fork == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ needs.setup.outputs.pr_number }}/merge
          submodules: recursive
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare .env
        run: cp .env.example .env

      - name: Build OpenELIS artifacts for plugin compilation
        run: |
          cd dataexport/dataexport-core
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          # NOTE: Do NOT add -Dmaven.test.skip=true here — the root build must
          # compile test classes so maven-jar-plugin produces the test-jar
          # (openelisglobal:jar:tests) required by GenericASTM/File/HL7 plugins.
          mvn clean install -DskipTests -Dspotless.check.skip=true -Dfix.version=3

      - name: Build plugins
        run: mvn clean install -DskipTests -Dmaven.test.skip=true
        working-directory: plugins

      - name: Stage plugin jars for runtime loading
        run: |
          rm -rf volume/plugins/*
          find plugins/analyzers -type f -path "*/target/*.jar" \
            ! -name "*sources.jar" ! -name "*javadoc.jar" \
            -exec cp {} volume/plugins/ \;
          ls -lah volume/plugins

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all compose images (cached, read-only)
        uses: docker/bake-action@v5
        with:
          files: |
            build.docker-compose.yml
            .github/ci/ci.analyzer-harness.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e-shared

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push compose images to GHCR
        run: |
          TAG="sha-${{ needs.setup.outputs.pr_sha }}"
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          export TAG OWNER_LOWER
          docker compose -f build.docker-compose.yml config --images | sort -u > /tmp/e2e-images-base.txt
          docker compose -f build.docker-compose.yml -f .github/ci/ci.analyzer-harness.yml config --images | sort -u > /tmp/e2e-images-full.txt
          xargs -r -I{} -P4 bash -lc '
            image="$1"
            [ -z "$image" ] && exit 0
            if docker image inspect "$image" >/dev/null 2>&1; then
              image_repo="$(echo "$image" | tr "[:upper:]" "[:lower:]" | sed "s|[^a-z0-9._/-]|-|g")"
              ghcr_image="ghcr.io/${OWNER_LOWER}/openelis-global-2/e2e-cache/${image_repo}:${TAG}"
              docker tag "$image" "$ghcr_image"
              push_err=$(docker push "$ghcr_image" 2>&1) && {
                printf "%s|%s\n" "$image" "$ghcr_image"
              } || {
                echo "PUSH FAILED ($image): $push_err" >&2
                exit 1
              }
            else
              echo "WARN: skipping $image (not built locally)" >&2
            fi
          ' _ {} < /tmp/e2e-images-full.txt | sort -u > /tmp/e2e-image-map.txt

          awk -F'|' 'NR==FNR {base[$1]=1; next} ($1 in base) {print}' \
            /tmp/e2e-images-base.txt /tmp/e2e-image-map.txt > /tmp/e2e-image-map-base.txt

          if [ ! -s /tmp/e2e-image-map.txt ]; then
            echo "::error::No images were pushed to GHCR"
            exit 1
          fi
          if [ ! -s /tmp/e2e-image-map-base.txt ]; then
            echo "WARN: no base compose image mappings found; falling back to full image map."
            cp /tmp/e2e-image-map.txt /tmp/e2e-image-map-base.txt
          fi
          echo "Pushed image mappings:"
          cat /tmp/e2e-image-map.txt

      - name: Upload plugin jars artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-plugin-jars
          path: volume/plugins/*.jar
          if-no-files-found: error
          retention-days: 1

      - name: Upload Docker image map artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image-map
          path: /tmp/e2e-image-map.txt
          if-no-files-found: error
          retention-days: 1

      - name: Upload base Docker image map artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map-base.txt
          if-no-files-found: error
          retention-days: 1

  # ─── Playwright Core (sharded) ──────────────────────────────────────────────
  # Identical for fork and non-fork. Only difference: where artifacts come from.
  playwright-core:
    name: Playwright Core ${{ matrix.shard_index }}/${{ matrix.shard_total }}
    needs: [setup, fork-rebuild]
    if: always() && needs.setup.outputs.image_transfer != 'none' && (needs.fork-rebuild.result == 'success' || needs.fork-rebuild.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 1
            shard_total: 2
          - shard_index: 2
            shard_total: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.is_fork == 'true' && format('refs/pull/{0}/merge', needs.setup.outputs.pr_number) || github.event.workflow_run.head_sha }}
          submodules: recursive
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Enforce Playwright guards
        run: npm run pw:guard
        working-directory: frontend

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Download image map from build workflow (non-fork)
        if: needs.setup.outputs.is_fork != 'true'
        uses: actions/download-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map
          run-id: ${{ needs.setup.outputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image map from fork-rebuild (fork)
        if: needs.setup.outputs.is_fork == 'true'
        uses: actions/download-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag prebuilt compose images
        run: |
          xargs -r -I{} -P4 bash -lc '
            IFS="|" read -r source_image ghcr_image <<< "$1"
            [ -z "$source_image" ] && exit 0
            docker pull "$ghcr_image" >/dev/null
            docker tag "$ghcr_image" "$source_image"
          ' _ {} < /tmp/e2e-image-map/e2e-image-map-base.txt

      - name: Start OpenELIS containers (no rebuild)
        run: docker compose -f build.docker-compose.yml up -d --no-build --wait --wait-timeout 600

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to respond..."
          timeout 60 bash -c 'until curl -k -s -f https://localhost/ > /dev/null; do sleep 2; done' || exit 1
          echo "Application is ready"

      - name: Load E2E foundational + demo patient data (order entry / OGC-284)
        run: |
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims -v ON_ERROR_STOP=1 \
            < src/test/resources/e2e-foundational-data.sql
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims -v ON_ERROR_STOP=1 \
            < src/test/resources/analyzer-harness-e2e.sql

      - name: Load FILE analyzer E2E fixtures (deactivate legacy types)
        run: |
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims -v ON_ERROR_STOP=1 \
            < src/test/resources/fixtures/file-import-e2e.sql

      - name: Create analyzer import directories in container
        run: |
          docker exec openelisglobal-webapp mkdir -p \
            /data/analyzer-imports/e2e-qs5/incoming \
            /data/analyzer-imports/e2e-qs7/incoming \
            /data/analyzer-imports/e2e-fluorocycler/incoming

      - name: Run Playwright tests
        run: npm run pw:test -- --project=core-app --project=core-demo --shard=${{ matrix.shard_index }}/${{ matrix.shard_total }}
        working-directory: frontend
        env:
          CI: true
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ vars.TEST_PASS || 'adminADMIN!' }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-blob-report-${{ matrix.shard_index }}
          path: frontend/blob-report
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-screenshots-${{ matrix.shard_index }}
          path: frontend/test-results/**/test-failed-*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-traces-${{ matrix.shard_index }}
          path: frontend/test-results/**/trace.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: "100"

  # ─── Analyzer Harness ────────────────────────────────────────────────────────
  analyzer-harness:
    name: Analyzer Harness
    needs: [setup, fork-rebuild]
    if: >-
      ${{
        always() &&
        needs.setup.outputs.image_transfer != 'none' &&
        (needs.fork-rebuild.result == 'success' || needs.fork-rebuild.result == 'skipped')
      }}
    uses: ./.github/workflows/e2e-playwright-analyzer-harness-reusable.yml
    permissions:
      contents: read
      packages: read
      actions: read
    with:
      build_run_id: ${{ needs.setup.outputs.build_run_id }}
      is_fork: ${{ needs.setup.outputs.is_fork }}
      head_sha: ${{ needs.setup.outputs.head_sha }}
      test_user: ${{ vars.TEST_USER || 'admin' }}
      test_pass: ${{ vars.TEST_PASS || 'adminADMIN!' }}

  # ─── Cypress (Deprecated) ───────────────────────────────────────────────────
  cypress:
    name: Cypress
    needs: [setup, fork-rebuild]
    if: >-
      ${{
        always() &&
        needs.setup.outputs.image_transfer != 'none' &&
        (needs.fork-rebuild.result == 'success' || needs.fork-rebuild.result == 'skipped')
      }}
    uses: ./.github/workflows/e2e-cypress-deprecated.yml
    permissions:
      contents: read
      packages: read
      actions: read
    with:
      build_run_id: ${{ needs.setup.outputs.build_run_id }}
      is_fork: ${{ needs.setup.outputs.is_fork }}
      head_sha: ${{ needs.setup.outputs.head_sha }}
      test_user: ${{ vars.TEST_USER || 'admin' }}
      test_pass: ${{ vars.TEST_PASS || 'adminADMIN!' }}

  # ─── Gate ───────────────────────────────────────────────────────────────────
  e2e-gate:
    name: E2E Gate
    if: always()
    needs: [setup, playwright-core, analyzer-harness, cypress]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce all E2E results
        run: |
          if [[ "${{ needs.setup.outputs.image_transfer }}" == "none" ]]; then
            echo "No image transfer mode available (build failure propagated)."
            exit 1
          fi
          if [[ "${{ needs.playwright-core.result }}" == "skipped" && "${{ needs.analyzer-harness.result }}" == "skipped" && "${{ needs.cypress.result }}" == "skipped" ]]; then
            echo "All E2E executors were skipped; failing gate."
            exit 1
          fi
          if [[ "${{ needs.playwright-core.result }}" != "success" ]]; then
            echo "Playwright Core failed: ${{ needs.playwright-core.result }}"
            exit 1
          fi
          if [[ "${{ needs.analyzer-harness.result }}" != "success" && "${{ needs.analyzer-harness.result }}" != "skipped" ]]; then
            echo "Analyzer Harness failed: ${{ needs.analyzer-harness.result }}"
            exit 1
          fi
          if [[ "${{ needs.cypress.result }}" != "success" ]]; then
            echo "Cypress failed: ${{ needs.cypress.result }}"
            exit 1
          fi
          echo "E2E gate passed."

  # ─── Report Status ──────────────────────────────────────────────────────────
  # Updates the check run on the PR with final E2E results.
  # workflow_run checks don't automatically appear on PRs, so we manage our own.
  report-status:
    name: Report Status
    if: always() && needs.setup.outputs.head_sha != ''
    needs: [setup, e2e-gate]
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - name: Update check run with results
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.setup.outputs.head_sha }}';
            const name = '03 Checkpoint - E2E';
            const gateResult = '${{ needs.e2e-gate.result }}';
            const imageTransfer = '${{ needs.setup.outputs.image_transfer }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let conclusion, title, summary;
            if (imageTransfer === 'none') {
              conclusion = 'failure';
              title = 'E2E build failed';
              summary = 'No Docker images were produced — E2E tests could not run.';
            } else if (gateResult === 'success') {
              conclusion = 'success';
              title = 'E2E tests passed';
              summary = 'All Playwright, Cypress, and Analyzer Harness tests passed.';
            } else {
              conclusion = 'failure';
              title = 'E2E tests failed';
              summary = 'One or more E2E test suites failed. Click **Details** to view the full run.';
            }

            // Find existing check run (created by e2e-pending-status.yml or set-pending-status job)
            const { data: { check_runs } } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              check_name: name,
              filter: 'latest'
            });

            if (check_runs.length > 0) {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: check_runs[0].id,
                status: 'completed',
                conclusion,
                details_url: runUrl,
                output: { title, summary }
              });
            } else {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                name,
                status: 'completed',
                conclusion,
                details_url: runUrl,
                output: { title, summary }
              });
            }
