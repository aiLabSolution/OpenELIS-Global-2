# Unified E2E test executor for both fork and non-fork PRs.
# Triggered by workflow_run when the build workflow (03 - E2E) completes.
# The workflow_run graph stays behind the stable `03 Checkpoint - E2E` status
# so the PR-facing checkpoint can link directly to the authoritative run.
#
# Non-fork PRs: images already in GHCR from the build workflow (cross_run).
# Fork PRs: fork-rebuild job builds and pushes images to GHCR (same_run),
#   since fork pull_request triggers get a read-only GITHUB_TOKEN.
name: E2E / Tests

on:
  workflow_run:
    workflows: ["03 - E2E"]
    types: [completed]

concurrency:
  group: e2e-tests-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  setup:
    name: E2E Context
    if: github.repository == 'DIGI-UW/OpenELIS-Global-2' && (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: read
    outputs:
      is_fork: ${{ steps.context.outputs.is_fork }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      checkout_ref: ${{ steps.context.outputs.checkout_ref }}
      status_sha: ${{ steps.context.outputs.status_sha }}
      build_run_id: ${{ steps.context.outputs.build_run_id }}
      artifact_source_mode: ${{ steps.context.outputs.artifact_source_mode }}
      artifact_map_kind: ${{ steps.context.outputs.artifact_map_kind }}
      include_plugin_jars: ${{ steps.context.outputs.include_plugin_jars }}
      checkpoint_context: ${{ steps.context.outputs.checkpoint_context }}
    steps:
      - name: Download build context artifact
        id: download
        uses: actions/download-artifact@v4
        with:
          name: e2e-build-context
          path: /tmp/e2e-build-context
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Parse build context
        id: context
        run: |
          if [ "${{ steps.download.outcome }}" != "success" ] || [ ! -d /tmp/e2e-build-context ]; then
            echo "No build context artifact — build likely failed."
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "status_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "build_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "artifact_source_mode=none" >> "$GITHUB_OUTPUT"
            echo "artifact_map_kind=base" >> "$GITHUB_OUTPUT"
            echo "include_plugin_jars=true" >> "$GITHUB_OUTPUT"
            echo "checkpoint_context=03 Checkpoint - E2E" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IS_FORK="$(cat /tmp/e2e-build-context/is_fork 2>/dev/null || echo 'false')"
          IMAGE_TRANSFER="$(cat /tmp/e2e-build-context/image_transfer 2>/dev/null || echo 'none')"
          PR_NUMBER="$(cat /tmp/e2e-build-context/pr_number 2>/dev/null || echo '')"
          HEAD_SHA="$(cat /tmp/e2e-build-context/head_sha 2>/dev/null || echo '')"

          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          fi

          # Fork PRs: build couldn't push to GHCR (read-only token), so
          # fork-rebuild will build and push within this workflow (same_run).
          # Non-fork PRs: images already in GHCR from the build (cross_run).
          if [ "$IS_FORK" = "true" ]; then
            ARTIFACT_SOURCE_MODE="same_run"
            CHECKOUT_REF="refs/pull/${PR_NUMBER}/merge"
          elif [ "$IMAGE_TRANSFER" = "ghcr" ]; then
            ARTIFACT_SOURCE_MODE="cross_run"
            CHECKOUT_REF="$HEAD_SHA"
          else
            ARTIFACT_SOURCE_MODE="none"
            CHECKOUT_REF="$HEAD_SHA"
          fi

          echo "is_fork=$IS_FORK" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "status_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "build_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          echo "artifact_source_mode=$ARTIFACT_SOURCE_MODE" >> "$GITHUB_OUTPUT"
          echo "artifact_map_kind=base" >> "$GITHUB_OUTPUT"
          echo "include_plugin_jars=true" >> "$GITHUB_OUTPUT"
          echo "checkpoint_context=03 Checkpoint - E2E" >> "$GITHUB_OUTPUT"

          echo "Build context: is_fork=$IS_FORK artifact_source_mode=$ARTIFACT_SOURCE_MODE pr=#$PR_NUMBER checkout_ref=$CHECKOUT_REF"

  set-pending-status:
    name: Set Pending Status
    needs: setup
    if: needs.setup.outputs.status_sha != ''
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post checkpoint status
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.setup.outputs.status_sha }}';
            const contextName = '03 Checkpoint - E2E';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'pending',
              context: contextName,
              description: 'Playwright, Cypress, and analyzer-harness suites are running...',
              target_url: runUrl
            });

  # ─── Fork Rebuild ──────────────────────────────────────────────────────────
  # Fork PRs get a read-only GITHUB_TOKEN on pull_request, so the build
  # workflow can't push images to GHCR. This job rebuilds from source within
  # the workflow_run context (which has the repo's write token) and pushes to
  # GHCR so the authoritative executor can pull them.
  fork-rebuild:
    name: Shared Build (Fork Rebuild)
    needs: setup
    if: needs.setup.outputs.is_fork == 'true' && needs.setup.outputs.artifact_source_mode == 'same_run'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.checkout_ref }}
          submodules: recursive
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare .env
        run: cp .env.example .env

      - name: Build OpenELIS artifacts for plugin compilation
        run: |
          cd dataexport/dataexport-core
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          # NOTE: Do NOT add -Dmaven.test.skip=true here — the root build must
          # compile test classes so maven-jar-plugin produces the test-jar
          # (openelisglobal:jar:tests) required by GenericASTM/File/HL7 plugins.
          mvn clean install -DskipTests -Dspotless.check.skip=true -Dfix.version=3

      - name: Build plugins
        run: mvn clean install -DskipTests -Dmaven.test.skip=true
        working-directory: plugins

      - name: Stage plugin jars for runtime loading
        run: |
          rm -rf volume/plugins/*
          find plugins/analyzers -type f -path "*/target/*.jar" \
            ! -name "*sources.jar" ! -name "*javadoc.jar" \
            -exec cp {} volume/plugins/ \;
          ls -lah volume/plugins

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all compose images (cached, read-only)
        uses: docker/bake-action@v5
        with:
          files: |
            build.docker-compose.yml
            .github/ci/ci.analyzer-harness.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e-shared

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push compose images to GHCR
        run: |
          TAG="sha-${{ needs.setup.outputs.status_sha }}"
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          export TAG OWNER_LOWER
          docker compose -f build.docker-compose.yml config --images | sort -u > /tmp/e2e-images-base.txt
          docker compose -f build.docker-compose.yml -f .github/ci/ci.analyzer-harness.yml config --images | sort -u > /tmp/e2e-images-full.txt
          xargs -r -I{} -P4 bash -lc '
            image="$1"
            [ -z "$image" ] && exit 0
            if docker image inspect "$image" >/dev/null 2>&1; then
              image_repo="$(echo "$image" | tr "[:upper:]" "[:lower:]" | sed "s|[^a-z0-9._/-]|-|g")"
              ghcr_image="ghcr.io/${OWNER_LOWER}/openelis-global-2/e2e-cache/${image_repo}:${TAG}"
              docker tag "$image" "$ghcr_image"
              push_err=$(docker push "$ghcr_image" 2>&1) && {
                printf "%s|%s\n" "$image" "$ghcr_image"
              } || {
                echo "PUSH FAILED ($image): $push_err" >&2
                exit 1
              }
            else
              echo "WARN: skipping $image (not built locally)" >&2
            fi
          ' _ {} < /tmp/e2e-images-full.txt | sort -u > /tmp/e2e-image-map.txt

          awk -F'|' 'NR==FNR {base[$1]=1; next} ($1 in base) {print}' \
            /tmp/e2e-images-base.txt /tmp/e2e-image-map.txt > /tmp/e2e-image-map-base.txt

          if [ ! -s /tmp/e2e-image-map.txt ]; then
            echo "::error::No images were pushed to GHCR"
            exit 1
          fi
          if [ ! -s /tmp/e2e-image-map-base.txt ]; then
            echo "WARN: no base compose image mappings found; falling back to full image map."
            cp /tmp/e2e-image-map.txt /tmp/e2e-image-map-base.txt
          fi
          echo "Pushed image mappings:"
          cat /tmp/e2e-image-map.txt

      - name: Upload plugin jars artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-plugin-jars
          path: volume/plugins/*.jar
          if-no-files-found: error
          retention-days: 1

      - name: Upload Docker image map artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image-map
          path: /tmp/e2e-image-map.txt
          if-no-files-found: error
          retention-days: 1

      - name: Upload base Docker image map artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map-base.txt
          if-no-files-found: error
          retention-days: 1

  # ─── Authoritative Executor ────────────────────────────────────────────────
  # Runs for both fork and non-fork PRs, using the shared reusable workflow.
  # Non-fork: pulls pre-built images from GHCR (cross_run from build workflow).
  # Fork: pulls images from GHCR (same_run from fork-rebuild above).
  authoritative-executor:
    name: Authoritative E2E Executor
    needs: [setup, fork-rebuild]
    # always() overrides GitHub's default behavior of skipping jobs when a
    # dependency (fork-rebuild) is skipped. Without it, non-fork PRs never
    # reach the executor because fork-rebuild is correctly skipped for them.
    if: >-
      always()
      && (
        (needs.setup.outputs.is_fork != 'true' && needs.setup.outputs.artifact_source_mode == 'cross_run')
        || (needs.setup.outputs.is_fork == 'true' && needs.fork-rebuild.result == 'success')
      )
    uses: ./.github/workflows/e2e-authoritative-reusable.yml
    permissions:
      contents: read
      packages: read
      actions: read
      issues: write
      pull-requests: write
    with:
      checkout_ref: ${{ needs.setup.outputs.checkout_ref }}
      status_sha: ${{ needs.setup.outputs.status_sha }}
      build_run_id: ${{ needs.setup.outputs.build_run_id }}
      artifact_source_mode: ${{ needs.setup.outputs.artifact_source_mode }}
      artifact_map_kind: ${{ needs.setup.outputs.artifact_map_kind }}
      include_plugin_jars: ${{ needs.setup.outputs.include_plugin_jars }}
      is_fork: ${{ needs.setup.outputs.is_fork }}
      pr_number: ${{ needs.setup.outputs.pr_number }}
      checkpoint_context: ${{ needs.setup.outputs.checkpoint_context }}
      test_user: ${{ vars.TEST_USER || 'admin' }}
      test_pass: ${{ vars.TEST_PASS || 'adminADMIN!' }}

  # ─── Build Failed Path ────────────────────────────────────────────────────
  missing-image-transfer:
    name: Missing Image Transfer
    needs: setup
    if: needs.setup.outputs.is_fork != 'true' && needs.setup.outputs.artifact_source_mode != 'cross_run'
    runs-on: ubuntu-latest
    steps:
      - name: Report missing transfer
        run: |
          echo "No GHCR image transfer available for non-fork E2E."
          exit 1

  # ─── Gate ──────────────────────────────────────────────────────────────────
  e2e-gate:
    name: E2E Gate
    if: always()
    needs:
      [
        setup,
        fork-rebuild,
        authoritative-executor,
        missing-image-transfer,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce E2E results
        run: |
          IS_FORK="${{ needs.setup.outputs.is_fork }}"
          ARTIFACT_MODE="${{ needs.setup.outputs.artifact_source_mode }}"

          if [[ "$IS_FORK" == "true" ]]; then
            # Fork path: fork-rebuild must succeed, then executor must succeed
            if [[ "${{ needs.fork-rebuild.result }}" != "success" ]]; then
              echo "Fork rebuild failed: ${{ needs.fork-rebuild.result }}"
              exit 1
            fi
            if [[ "${{ needs.authoritative-executor.result }}" != "success" ]]; then
              echo "Authoritative executor failed: ${{ needs.authoritative-executor.result }}"
              exit 1
            fi
          else
            # Non-fork path: need cross_run images, then executor must succeed
            if [[ "$ARTIFACT_MODE" != "cross_run" ]]; then
              echo "No GHCR image transfer available for non-fork E2E."
              exit 1
            fi
            if [[ "${{ needs.authoritative-executor.result }}" != "success" ]]; then
              echo "Authoritative executor failed: ${{ needs.authoritative-executor.result }}"
              exit 1
            fi
          fi
          echo "E2E gate passed (fork=$IS_FORK)."

  # ─── Report ────────────────────────────────────────────────────────────────
  report-status:
    name: Report Status
    if: always() && needs.setup.outputs.status_sha != '' && needs.e2e-gate.result != 'cancelled'
    needs: [setup, set-pending-status, e2e-gate]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Update checkpoint status
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.setup.outputs.status_sha }}';
            const contextName = '03 Checkpoint - E2E';
            const gateResult = '${{ needs.e2e-gate.result }}';
            const artifactSourceMode = '${{ needs.setup.outputs.artifact_source_mode }}';
            const isFork = '${{ needs.setup.outputs.is_fork }}' === 'true';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let state, description;
            if (artifactSourceMode === 'none' && !isFork) {
              state = 'failure';
              description = 'E2E build failed - no Docker images were produced';
            } else if (gateResult === 'success') {
              state = 'success';
              description = 'All Playwright, Cypress, and analyzer-harness suites passed';
            } else {
              state = 'failure';
              description = 'One or more E2E suites failed';
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: contextName,
              description,
              target_url: runUrl
            });
