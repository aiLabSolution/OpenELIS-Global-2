# Cypress E2E — DEPRECATED (will be removed after full Playwright migration).
# Called by e2e-playwright.yml as a reusable workflow under the E2E umbrella.
# Images come from the shared-build job via e2e-image-map artifact.
name: E2E / Cypress (Deprecated)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      build_run_id:
        description: "Run ID of the build workflow (for cross-run artifact download). Empty = same run."
        required: false
        type: string
        default: ""
      is_fork:
        description: "Whether this is a fork PR (artifacts in same run from fork-rebuild)"
        required: false
        type: string
        default: "false"
      head_sha:
        description: "PR head SHA to checkout (ensures Cypress uses PR's test files, not develop)"
        required: false
        type: string
        default: ""
      test_user:
        description: "CI login user for Cypress execution"
        required: false
        type: string
        default: ""
      test_pass:
        description: "CI login password for Cypress execution"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: read
  actions: read

jobs:
  e2e-cypress:
    name: ${{ matrix.shard_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: core
            shard_name: Core
            specs: >-
              cypress/e2e/login.cy.js,
              cypress/e2e/home.cy.js,
              cypress/e2e/AdminE2E/organizationManagement.cy.js,
              cypress/e2e/AdminE2E/providerManagement.cy.js,
              cypress/e2e/patientEntry.cy.js,
              cypress/e2e/orderEntity.cy.js,
              cypress/e2e/modifyOrder.cy.js,
              cypress/e2e/batchOrderEntry.cy.js,
              cypress/e2e/workplan.cy.js,
              cypress/e2e/result.cy.js,
              cypress/e2e/validation.cy.js,
              cypress/e2e/nonConform.cy.js,
              cypress/e2e/dashboard.cy.js,
              cypress/e2e/report.cy.js,
              cypress/e2e/AdminE2E/barcode.cy.js
          - shard: admin
            shard_name: Admin
            specs: >-
              cypress/e2e/AdminE2E/userManagement.cy.js,
              cypress/e2e/siteBranding.cy.js,
              cypress/e2e/patientMerge.cy.js,
              cypress/e2e/help.cy.js,
              cypress/e2e/labNumberManagement.cy.js,
              cypress/e2e/AdminE2E/dictionaryMenu.cy.js,
              cypress/e2e/AdminE2E/calculatedValueTestsManagement.cy.js,
              cypress/e2e/AdminE2E/batchTestReassignmentandCancelation.cy.js
          - shard: independent
            shard_name: Independent
            specs: ""
    steps:
      - name: Checkout OpenELIS-Global2
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.sha }}
          repository: ${{github.repository}}
          submodules: recursive
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Download image map from build workflow (non-fork)
        if: inputs.is_fork != 'true' && inputs.build_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map
          run-id: ${{ inputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image map from fork-rebuild (fork)
        if: inputs.is_fork == 'true' || inputs.build_run_id == ''
        uses: actions/download-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag prebuilt compose images
        run: |
          xargs -r -I{} -P4 bash -lc '
            IFS="|" read -r source_image ghcr_image <<< "$1"
            [ -z "$source_image" ] && exit 0
            docker pull "$ghcr_image" >/dev/null
            docker tag "$ghcr_image" "$source_image"
          ' _ {} < /tmp/e2e-image-map/e2e-image-map-base.txt

      - name: Start containers
        run: docker compose -f build.docker-compose.yml up -d --no-build --wait --wait-timeout 600

      - name: Load test fixtures into database
        run: |
          docker compose -f build.docker-compose.yml exec -T db.openelis.org psql -U clinlims -d clinlims --set=ON_ERROR_STOP=on < src/test/resources/e2e-foundational-data.sql

      - name: Compute catch-all specs for independent shard
        if: matrix.shard == 'independent'
        id: catchall
        working-directory: frontend
        run: |
          ASSIGNED=$(grep -E '^\s+cypress/e2e/' ../.github/workflows/e2e-cypress-deprecated.yml \
            | sed 's/^[[:space:]]*//' | sed 's/,$//' | sort -u)
          ALL=$(find cypress/e2e -name '*.cy.js' -type f | sort)
          REMAINING=""
          while IFS= read -r spec; do
            echo "$ASSIGNED" | grep -qxF "$spec" || REMAINING="${REMAINING:+$REMAINING,}$spec"
          done <<< "$ALL"
          echo "specs=$REMAINING" >> "$GITHUB_OUTPUT"
          TOTAL=$(echo "$ALL" | wc -l)
          ASSIGNED_COUNT=$(echo "$ASSIGNED" | wc -l)
          REMAINING_COUNT=$(echo "$REMAINING" | tr ',' '\n' | wc -l)
          echo "Catch-all: $REMAINING_COUNT specs (of $TOTAL total, $ASSIGNED_COUNT assigned to other shards)"
          echo "$REMAINING" | tr ',' '\n' | sed 's/^/  /'

      - name: Run Cypress E2E Tests — ${{ matrix.shard }}
        run: |
          if [ "${{ matrix.shard }}" = "independent" ]; then
            SPECS="${{ steps.catchall.outputs.specs }}"
          else
            SPECS="${{ matrix.specs }}"
          fi
          echo "Running specs: $SPECS"
          npx cypress run --browser chrome --headless --spec "$SPECS"
        working-directory: frontend
        env:
          E2E_FAIL_FAST: "true"
          CYPRESS_FAIL_FAST_ENABLED: "true"
          CYPRESS_BASE_URL: https://localhost
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
          TEST_USER: ${{ inputs.test_user || vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ inputs.test_pass || vars.TEST_PASS || 'adminADMIN!' }}

      - name: Upload Cypress screenshots (${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.shard }}
          path: frontend/cypress/screenshots/**/*.png
          if-no-files-found: ignore

      - name: Dump backend logs (${{ matrix.shard }})
        if: always()
        run: |
          echo "=== OpenELIS Backend Logs (last 500 lines) ==="
          docker compose -f build.docker-compose.yml logs --tail=500 oe.openelis.org 2>&1 || true
          echo ""
          echo "=== Database Logs (last 200 lines) ==="
          docker compose -f build.docker-compose.yml logs --tail=200 db.openelis.org 2>&1 || true

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: "100"
