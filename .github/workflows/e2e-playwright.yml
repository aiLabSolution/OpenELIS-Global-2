# Build-only workflow for the E2E pipeline. Non-fork tests run later in the
# workflow_run wrapper so the PR-facing checkpoint can stay clean, while fork
# PRs delegate real execution to the pull_request_target workflow.
name: 03 - E2E

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Shared Build ───────────────────────────────────────────────────────────
  # Single image producer for the E2E pipeline. The downstream workflow_run
  # wrapper consumes these artifacts for non-fork execution and reports the
  # stable `03 Checkpoint - E2E` contract.
  shared-build:
    name: Shared Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_transfer: ${{ steps.push-images.outputs.mode }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare .env
        run: cp .env.example .env

      - name: Build OpenELIS artifacts for plugin compilation
        run: |
          cd dataexport/dataexport-core
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          # NOTE: Do NOT add -Dmaven.test.skip=true here — the root build must
          # compile test classes so maven-jar-plugin produces the test-jar
          # (openelisglobal:jar:tests) required by GenericASTM/File/HL7 plugins.
          mvn clean install -DskipTests -Dspotless.check.skip=true -Dfix.version=3

      - name: Build plugins
        run: mvn clean install -DskipTests -Dmaven.test.skip=true
        working-directory: plugins

      - name: Stage plugin jars for runtime loading
        run: |
          rm -rf volume/plugins/*
          find plugins/analyzers -type f -path "*/target/*.jar" \
            ! -name "*sources.jar" ! -name "*javadoc.jar" \
            -exec cp {} volume/plugins/ \;
          ls -lah volume/plugins

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all compose images (cached)
        uses: docker/bake-action@v5
        with:
          files: |
            build.docker-compose.yml
            .github/ci/ci.analyzer-harness.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e-shared
            *.cache-to=type=gha,scope=e2e-shared,mode=max

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push compose images to GHCR
        id: push-images
        run: |
          TAG="sha-${GITHUB_SHA}"
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          export TAG OWNER_LOWER
          docker compose -f build.docker-compose.yml config --images | sort -u > /tmp/e2e-images-base.txt
          docker compose -f build.docker-compose.yml -f .github/ci/ci.analyzer-harness.yml config --images | sort -u > /tmp/e2e-images-full.txt

          PUSH_FAILED=false
          xargs -r -I{} -P4 bash -lc '
            image="$1"
            [ -z "$image" ] && exit 0
            if docker image inspect "$image" >/dev/null 2>&1; then
              image_repo="$(echo "$image" | tr "[:upper:]" "[:lower:]" | sed "s|[^a-z0-9._/-]|-|g")"
              ghcr_image="ghcr.io/${OWNER_LOWER}/openelis-global-2/e2e-cache/${image_repo}:${TAG}"
              docker tag "$image" "$ghcr_image"
              push_err=$(docker push "$ghcr_image" 2>&1) && {
                printf "%s|%s\n" "$image" "$ghcr_image"
              } || {
                echo "PUSH FAILED ($image): $push_err" >&2
                exit 1
              }
            else
              echo "WARN: skipping $image (not built locally)" >&2
            fi
          ' _ {} < /tmp/e2e-images-full.txt | sort -u > /tmp/e2e-image-map.txt || PUSH_FAILED=true

          if [ "$PUSH_FAILED" = "false" ] && [ -s /tmp/e2e-image-map.txt ]; then
            echo "mode=ghcr" >> "$GITHUB_OUTPUT"
            echo "GHCR push succeeded — using registry transfer"

            awk -F'|' 'NR==FNR {base[$1]=1; next} ($1 in base) {print}' \
              /tmp/e2e-images-base.txt /tmp/e2e-image-map.txt > /tmp/e2e-image-map-base.txt

            if [ ! -s /tmp/e2e-image-map-base.txt ]; then
              echo "WARN: no base compose image mappings found; falling back to full image map."
              cp /tmp/e2e-image-map.txt /tmp/e2e-image-map-base.txt
            fi
            echo "Pushed image mappings:"
            cat /tmp/e2e-image-map.txt
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "mode=fork-fallback" >> "$GITHUB_OUTPUT"
            echo "::warning::GHCR push denied for fork PR — delegated fork executor will rebuild from cache"
          else
            echo "::error::GHCR push failed (non-fork path)"
            exit 1
          fi

      - name: Prepare build context data
        if: always()
        run: |
          mkdir -p /tmp/e2e-build-context
          MODE="${{ steps.push-images.outputs.mode }}"
          echo "${MODE:-none}" > /tmp/e2e-build-context/image_transfer
          echo "${{ github.event_name }}" > /tmp/e2e-build-context/event_name

          IS_FORK="false"
          PR_NUMBER=""
          PR_SHA=""
          HEAD_SHA=""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_SHA="${{ github.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
              IS_FORK="true"
            fi
          fi

          echo "$IS_FORK" > /tmp/e2e-build-context/is_fork
          echo "$PR_NUMBER" > /tmp/e2e-build-context/pr_number
          echo "$PR_SHA" > /tmp/e2e-build-context/pr_sha
          echo "$HEAD_SHA" > /tmp/e2e-build-context/head_sha

          echo "Build context: mode=${MODE:-none} event=${{ github.event_name }} fork=$IS_FORK pr=#$PR_NUMBER"

      - name: Upload build context for E2E wrapper workflow
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-build-context
          path: /tmp/e2e-build-context/
          retention-days: 1

      - name: Upload plugin jars artifact
        if: steps.push-images.outputs.mode == 'ghcr'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-plugin-jars
          path: volume/plugins/*.jar
          if-no-files-found: error
          retention-days: 1

      - name: Upload Docker image map artifact
        if: steps.push-images.outputs.mode == 'ghcr'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image-map
          path: /tmp/e2e-image-map.txt
          if-no-files-found: error
          retention-days: 1

      - name: Upload base Docker image map artifact
        if: steps.push-images.outputs.mode == 'ghcr'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image-map-base
          path: /tmp/e2e-image-map-base.txt
          if-no-files-found: error
          retention-days: 1
