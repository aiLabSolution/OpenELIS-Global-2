version: "3.3"

services:
  astm-simulator:
    build:
      context: ./tools/analyzer-mock-server
      dockerfile: Dockerfile
    image: openelis-astm-simulator.ci
    container_name: openelis-astm-simulator
    # Harness lane accession (HARN-GX-*) — main repo copy so CI does not depend on
    # analyzer-mock-server submodule revision for Playwright expectations.
    volumes:
      - ./projects/analyzer-harness/e2e-fixtures/genexpert_astm.json:/app/templates/genexpert_astm.json:ro
    ports:
      - "5000:9600"
      - "8085:8080"
    environment:
      - ASTM_PORT=9600
      - ASTM_TEMPLATE=genexpert_astm
      - RESPONSE_DELAY_MS=0
    command: >
      python -u server.py
      --port 9600
      --simulate-api-port 8080
      --verbose
    networks:
      analyzer-net:
        ipv4_address: 172.21.1.100
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',9600)); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  openelis-analyzer-bridge:
    build:
      context: ./tools/openelis-analyzer-bridge
      dockerfile: Dockerfile
    image: openelis-analyzer-bridge.ci
    container_name: openelis-analyzer-bridge
    ports:
      - "8442:8443"
      - "12000:12001"
    volumes:
      - ./volume/openelis-analyzer-bridge/configuration.yml:/app/configuration.yml:ro
      - ./projects/analyzer-harness/volume/analyzer-imports:/data/analyzer-imports
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - LOGGING_LEVEL_ORG_ITECH=INFO
      # Bridge connects directly to app (not through proxy), so no /api/ prefix
      # HttpForwardingRouter appends /astm, /hl7, /csv per message protocol
      - ORG_ITECH_AHB_FORWARD_HTTP_SERVER_URI=https://oe.openelis.org:8443/OpenELIS-Global/analyzer
      - ORG_ITECH_AHB_FORWARD_HTTP_SERVER_INSECURE_TLS=true
      # TEST-ONLY: disables hostname verification for self-signed harness certs
      - JDK_JAVA_OPTIONS=-Djdk.internal.httpclient.disableHostnameVerification=true
      - ORG_ITECH_AHB_LISTEN_ASTM_SERVER_PORT=12001
      - ORG_ITECH_AHB_FORWARD_ASTM_SERVER_HOST_NAME=astm-simulator
      - ORG_ITECH_AHB_FORWARD_ASTM_SERVER_PORT=9600
    networks:
      - analyzer-net
    restart: unless-stopped

  oe.openelis.org:
    environment:
      - ANALYZER_BRIDGE_URL=http://openelis-analyzer-bridge:8443
      # Full CATALINA_OPTS required here so compose merge replaces (not drops) base JVM flags.
      # file.import.poll.interval: harness-only fast poll; production default remains in application.properties.
      # MUST stay aligned with FILE_IMPORT_POLL_MS in e2e-playwright-analyzer-harness-reusable.yml.
      - CATALINA_OPTS=-Ddatasource.url=jdbc:postgresql://db.openelis.org:5432/clinlims -Ddatasource.username=clinlims -Ddatasource.password=${OE_DB_PASSWORD:-clinlims} -Doe.ssl.truststorepath=${SSL_TRUSTSTORE_PATH:-/etc/openelis-global/truststore} -Doe.ssl.truststorepassword=${SSL_TRUSTSTORE_PASSWORD:-tspass} -Doe.ssl.keystorepath=${SSL_KEYSTORE_PATH:-/etc/openelis-global/keystore} -Doe.ssl.keystorepassword=${SSL_KEYSTORE_PASSWORD:-kspass} -Dfile.import.poll.interval=5000
    volumes:
      - ./projects/analyzer-profiles:/data/analyzer-profiles:ro
      - ./projects/analyzer-harness/config-templates:/var/lib/openelis-global/configuration/backend:ro
      - ./projects/analyzer-harness/volume/analyzer-imports:/data/analyzer-imports
    networks:
      - default
      - analyzer-net

  proxy:
    networks:
      - default
      - analyzer-net

networks:
  analyzer-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.1.0/24
