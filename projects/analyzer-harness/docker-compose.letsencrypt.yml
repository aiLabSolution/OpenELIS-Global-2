# Let's Encrypt override for analyzer harness. Uses the repo's volume/letsencrypt
# so valid certs (from docs/LETSENCRYPT_SETUP.md) are shared. LETSENCRYPT_DOMAIN
# and LETSENCRYPT_EMAIL must be set in .env (no silent default — wrong hostname
# silently mis-serves HTTPS). /restart-analyzer-harness runs
# generate-letsencrypt-certs.sh automatically when both are set.

services:
  proxy:
    volumes:
      - certs-vol:/etc/nginx/certs/
      - keys-vol:/etc/nginx/keys/
      - ./volume/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../volume/nginx/certbot:/var/www/certbot
      - ../../volume/letsencrypt:/etc/letsencrypt:ro
      - ../../nginx-proxy/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    environment:
      - LETSENCRYPT_DOMAIN=${LETSENCRYPT_DOMAIN:?LETSENCRYPT_DOMAIN must be set in .env for the Lets Encrypt overlay}
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
